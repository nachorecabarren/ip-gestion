<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo__mark">iP</span>
      <span class="login-logo__text">Gestión</span>
    </div>

    <h1 class="login-title">Iniciar sesión</h1>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          formControlName="email"
          type="email"
          class="form-control"
          placeholder="tu@email.com"
          autocomplete="username"
          [class.form-control--error]="form.get('email')?.invalid && form.get('email')?.touched"
        />
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="password-wrap">
          <input
            formControlName="password"
            [type]="showPassword() ? 'text' : 'password'"
            class="form-control"
            placeholder="••••••••"
            autocomplete="current-password"
            [class.form-control--error]="form.get('password')?.invalid && form.get('password')?.touched"
          />
          <button type="button" class="password-toggle" (click)="showPassword.set(!showPassword())">
            <svg *ngIf="!showPassword()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div *ngIf="error()" class="login-error">
        {{ error() }}
      </div>

      <button type="submit" class="btn btn--primary login-btn" [disabled]="loading()">
        <span *ngIf="!loading()">Entrar</span>
        <span *ngIf="loading()">Ingresando…</span>
      </button>
    </form>

    <p class="login-foot">
      ¿No tenés cuenta? <a routerLink="/registro">Registrá tu negocio</a>
    </p>
  </div>
</div>
